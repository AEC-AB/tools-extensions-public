name: Publish Extension Docs NuGet

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - src/Assistant/dotnet/CW.Assistant.ExtensionDocs.Bundle/**
      - .github/workflows/publish-extension-docs-nuget.yml
  pull_request:
    branches:
      - main
    paths:
      - docs/**
      - src/Assistant/dotnet/CW.Assistant.ExtensionDocs.Bundle/**
      - .github/workflows/publish-extension-docs-nuget.yml
  workflow_dispatch:

jobs:
  pack-and-publish:
    name: Pack and publish docs package
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Compute package version
        id: version
        shell: pwsh
        run: |
          $baseVersion = "1.0.${{ github.run_number }}"

          if ("${{ github.event_name }}" -eq "pull_request") {
            $prNumber = "${{ github.event.pull_request.number }}"
            $suffix = "pr.$prNumber.${{ github.run_attempt }}"
            $packageVersion = "$baseVersion-$suffix"
          }
          else {
            $packageVersion = $baseVersion
          }

          "PACKAGE_VERSION=$packageVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Package version: $packageVersion"

      - name: Restore docs package
        run: dotnet restore src/Assistant/dotnet/CW.Assistant.ExtensionDocs.Bundle/CW.Assistant.ExtensionDocs.Bundle.csproj

      - name: Pack docs package
        run: >-
          dotnet pack src/Assistant/dotnet/CW.Assistant.ExtensionDocs.Bundle/CW.Assistant.ExtensionDocs.Bundle.csproj
          --configuration Release
          --no-restore
          -p:PackageVersion=${{ env.PACKAGE_VERSION }}
          --output ${{ github.workspace }}/artifacts/nuget

      - name: Evaluate publish conditions
        id: publish_gate
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.AEC_TOOLS_FEED_TOKEN }}
        run: |
          $hasToken = -not [string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)
          $isPr = "${{ github.event_name }}" -eq "pull_request"
          $isSameRepoPr = "${{ github.event.pull_request.head.repo.full_name }}" -eq "${{ github.repository }}"

          $canPublish = $hasToken -and (-not $isPr -or $isSameRepoPr)

          "HAS_TOKEN=$hasToken" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "CAN_PUBLISH=$canPublish" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate publish token for main pushes
        if: ${{ github.event_name == 'push' && steps.publish_gate.outputs.HAS_TOKEN != 'True' }}
        shell: pwsh
        run: |
          throw "AEC_TOOLS_FEED_TOKEN is not configured."

      - name: Skip publish notice for PR without token access
        if: ${{ github.event_name == 'pull_request' && steps.publish_gate.outputs.CAN_PUBLISH != 'True' }}
        shell: pwsh
        run: |
          Write-Warning "Skipping NuGet push for this PR because AEC_TOOLS_FEED_TOKEN is unavailable (or PR is from a fork)."

      - name: Push package to NuGet.org
        if: ${{ steps.publish_gate.outputs.CAN_PUBLISH == 'True' }}
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.AEC_TOOLS_FEED_TOKEN }}
        run: |
          $packageDirectory = Join-Path "${{ github.workspace }}" "artifacts/nuget"
          $packages = Get-ChildItem -Path $packageDirectory -Filter *.nupkg -File

          if ($packages.Count -eq 0) {
            throw "No .nupkg files found in $packageDirectory"
          }

          foreach ($package in $packages) {
            Write-Host "Pushing $($package.FullName)"
            dotnet nuget push $package.FullName `
              --api-key "$env:NUGET_API_KEY" `
              --source "https://api.nuget.org/v3/index.json" `
              --skip-duplicate

            if ($LASTEXITCODE -ne 0) {
              throw "dotnet nuget push failed for $($package.FullName)"
            }
          }
